name: publish-image

# Builds the agent-runtime image and pushes it to the public Artifact Registry
# repo so `cloudy-handoff init` can pull it instead of building from source.
# Auth is keyless via Workload Identity Federation (no stored service-account key).

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'scripts/**'
      - 'deploy/**'
      - '.github/workflows/publish-image.yml'
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # required for WIF

env:
  IMAGE: us-central1-docker.pkg.dev/cloudy-handoff-public/images/cloudy-handoff
  WIF_PROVIDER: projects/370097704335/locations/global/workloadIdentityPools/github-pool/providers/github
  WIF_SA: gh-publisher@cloudy-handoff-public.iam.gserviceaccount.com

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Compute tags
        id: tags
        run: |
          echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "ver=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "ver=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          tags=( -t "${IMAGE}:latest" -t "${IMAGE}:${{ steps.tags.outputs.sha }}" )
          [ -n "${{ steps.tags.outputs.ver }}" ] && tags+=( -t "${IMAGE}:${{ steps.tags.outputs.ver }}" )
          docker build -f docker/Dockerfile "${tags[@]}" .

      - name: Push
        run: docker push --all-tags "${IMAGE}"
